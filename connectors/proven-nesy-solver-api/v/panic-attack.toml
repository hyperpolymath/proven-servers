# SPDX-License-Identifier: PMPL-1.0-or-later
# panic-attack configuration for the proven-nesy-solver-api V hexadeca surfaces.
#
# All 16 protocol surfaces (rest → verisimdb) share two source files:
#   server.v                  — REST entry point + Vweb routes
#   nesy_solver_api_adapter.v — hexadeca adapter: SurfaceKind enum + FFI bridge
#
# Run locally:
#   panic-attack assail . --config panic-attack.toml
#
# The hexadeca.surfaces list is used by the CI workflow to report per-surface
# findings in $GITHUB_STEP_SUMMARY.

[assail]
verbose = true
include_hidden = false
# Minimum file size to scan — avoids noise from 1-line stubs.
min_lines = 5

[report]
format = "json"
colors = true
per_file = true

[thresholds]
# 75 is the minimum bar for a connector that touches a public API.
min_robustness_score = 75.0
# Each weak point maps to one scan category (unsafe_blocks, partial_casts, etc.).
max_weak_points = 5
fail_on_critical = true

# ---------------------------------------------------------------------------
# Hexadeca surface registry
# ---------------------------------------------------------------------------
# Each surface maps to its SurfaceKind tag in nesy_solver_api_adapter.v.
# Findings are attributed to a surface when they touch code guarded by that
# tag's match arm or the surface's call-site in server.v.
# ---------------------------------------------------------------------------
[hexadeca]
surfaces = [
  "rest",         # tag 0  — primary public-facing entry point (server.v)
  "graphql",      # tag 1
  "websocket",    # tag 2
  "sse",          # tag 3
  "grpc",         # tag 4
  "jsonrpc",      # tag 5
  "msgpack_rpc",  # tag 6
  "cbor",         # tag 7
  "flatbuffers",  # tag 8
  "capnproto",    # tag 9
  "bebop",        # tag 10
  "trpc",         # tag 11
  "mqtt",         # tag 12
  "amqp",         # tag 13
  "soap",         # tag 14
  "verisimdb",    # tag 15 — VeriSimDB proof-attempt recording
]

# Per-surface threshold overrides.  REST and VerisimDB are the two surfaces
# that are actually wired at runtime; hold them to a higher standard.
[hexadeca.surface_thresholds]
rest      = { min_robustness_score = 85.0, max_weak_points = 3 }
verisimdb = { min_robustness_score = 85.0, max_weak_points = 3 }
