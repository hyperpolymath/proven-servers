# SPDX-License-Identifier: MPL-2.0
# Instant Forge Sync - Triggers propagation to all forges on push/release
name: Instant Sync

on:
  push:
    branches: [main, master]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Presence-gate the dispatch secret: on forks / repos without the token the
    # step skips cleanly instead of failing (workflow_audit:
    # secret_action_without_presence_gate). secrets can't be read in `if:`, so
    # map to env first and gate on that.
    env:
      FARM_DISPATCH_TOKEN: ${{ secrets.FARM_DISPATCH_TOKEN }}
    steps:
      - name: Trigger Propagation
        if: ${{ env.FARM_DISPATCH_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v3
        with:
          token: ${{ env.FARM_DISPATCH_TOKEN }}
          repository: hyperpolymath/.git-private-farm
          event-type: propagate
          client-payload: |-
            {
              "repo": "${{ github.event.repository.name }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "forges": ""
            }

      - name: Confirm
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: echo "::notice::Propagation triggered for ${REPO_NAME}"

      - name: K9-SVC Validation
        run: |
          echo "K9-SVC validation"
          [ -d .machine_readable/contractiles ] && echo "Contractiles present" || echo "No contractiles"
