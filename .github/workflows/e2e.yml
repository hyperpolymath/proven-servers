#
# proven-servers — E2E + Safety + Bench
#
# Tests ABI/FFI round-trip across 6 connectors, 84 protocols, and 8 core
# primitives. Safety aspects enforce no dangerous patterns.

name: E2E + Safety + Bench
on:
  push:
    branches: [main, master, develop]
    paths:
      - 'connectors/**'
      - 'protocols/**'
      - 'core/**'
      - 'bindings/**'
      - 'tests/**'
      - 'tools/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions: read-all
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    name: E2E — Connector + Protocol FFI Round-Trip
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406  # v2.2.1
        with:
          version: 0.15.1
      # Builds the proven Idris ABI/engine so e2e.sh Section 0 can verify the
      # proofs and that the generated header/Zig constants still match them.
      # From-source (pinned v0.7.0) is the standard Linux install; if a runner
      # needs a different method, e2e.sh Section 0 skips the Idris steps
      # gracefully and the Zig comptime guard still runs.
      - name: Install Idris2 0.7.0
        # Best-effort: a from-source build can vary by runner. If it fails,
        # e2e.sh Section 0 skips the Idris steps and the Zig comptime guard
        # still runs -- so the conformance check degrades gracefully rather
        # than blocking the whole E2E job at this step.
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y chezscheme libgmp-dev
          git clone --depth 1 --branch v0.7.0 https://github.com/idris-lang/Idris2.git "$RUNNER_TEMP/Idris2"
          make -C "$RUNNER_TEMP/Idris2" bootstrap SCHEME=scheme
          make -C "$RUNNER_TEMP/Idris2" install
          echo "$HOME/.idris2/bin" >> "$GITHUB_PATH"
          "$HOME/.idris2/bin/idris2" --version
      - name: Run E2E test suite
        run: bash tests/e2e.sh
  benchmarks:
    name: Bench — Rust Binding Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: bindings/rust
      - name: Run benchmarks
        run: |
          if [ -f "bindings/rust/Cargo.toml" ]; then
            cargo bench --manifest-path bindings/rust/Cargo.toml 2>&1 | tee /tmp/bench-results.txt
          else
            echo "No Rust bindings Cargo.toml found"
          fi
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: /tmp/bench-results.txt
          retention-days: 30
