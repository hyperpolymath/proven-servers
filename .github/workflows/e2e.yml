#
# proven-servers — E2E + Safety + Bench
#
# Tests ABI/FFI round-trip across 6 connectors, 84 protocols, and 8 core
# primitives. Safety aspects enforce no dangerous patterns.

name: E2E + Safety + Bench
on:
  push:
    branches: [main, master, develop]
    paths:
      - 'connectors/**'
      - 'protocols/**'
      - 'core/**'
      - 'bindings/**'
      - 'tests/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions: read-all
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    name: E2E — Connector + Protocol FFI Round-Trip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406  # v2.2.1
        with:
          version: 0.15.1
      - name: Run E2E test suite
        run: bash tests/e2e.sh
  benchmarks:
    name: Bench — Rust Binding Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: bindings/rust
      - name: Run benchmarks
        run: |
          if [ -f "bindings/rust/Cargo.toml" ]; then
            cargo bench --manifest-path bindings/rust/Cargo.toml 2>&1 | tee /tmp/bench-results.txt
          else
            echo "No Rust bindings Cargo.toml found"
          fi
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: /tmp/bench-results.txt
          retention-days: 30
