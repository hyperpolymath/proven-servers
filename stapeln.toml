# SPDX-License-Identifier: MPL-2.0
# stapeln.toml — Layer-based container build for proven-servers
#
# stapeln builds containers as composable layers (German: "to stack").
# Each layer is independently cacheable, verifiable, and signable.

[metadata]
name = "proven-servers"
version = "0.1.0"
description = "proven-servers container service"
author = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"
license = "MPL-2.0"
registry = "ghcr.io/hyperpolymath"

[build]
containerfile = "Containerfile"
context = "."
runtime = "podman"

# ── Layer Definitions ──────────────────────────────────────────

[layers.base]
description = "Chainguard Wolfi minimal base"
from = "cgr.dev/chainguard/wolfi-base:latest"
cache = true
verify = true

[layers.zig-toolchain]
description = "Zig compiler"
extends = "base"
packages = ["zig"]
cache = true

[layers.build]
description = "proven-servers Zig compilation"
extends = "zig-toolchain"
commands = ["zig build -Doptimize=ReleaseSafe"]
artifacts = [
    { src = "zig-out/bin/proven-servers", dst = "/app/proven-servers" },
]

[layers.runtime]
description = "Minimal runtime"
from = "cgr.dev/chainguard/wolfi-base:latest"
packages = ["ca-certificates", "curl"]
copy-from = [
    { layer = "build", src = "/app/", dst = "/app/" },
]
entrypoint = ["["/usr/local/bin/proven_servers"]"]
user = "nonroot"
env = { PATH = "/root/.pack/bin:${PATH}" }

# ── Security ───────────────────────────────────────────────────

[security]
non-root = true
read-only-root = false
no-new-privileges = true
cap-drop = ["ALL"]
seccomp-profile = "default"

[security.signing]
algorithm = "ML-DSA-87"
provider = "cerro-torre"

[security.sbom]
format = "spdx-json"
output = "sbom.spdx.json"
include-deps = true

# ── Verification ───────────────────────────────────────────────

[verify]
vordr = true
svalinn = true
scan-on-build = true
fail-on = ["critical", "high"]

# ── Targets ────────────────────────────────────────────────────

[targets.development]
layers = ["base", "zig-toolchain", "build"]
env = { LOG_LEVEL = "debug" }

[targets.production]
layers = ["runtime"]
env = { LOG_LEVEL = "info" }

[targets.test]
layers = ["base", "zig-toolchain", "build"]
env = { LOG_LEVEL = "debug" }
